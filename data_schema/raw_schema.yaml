name: lap_time_prediction_schema
version: 1.0

numerical_columns:
  - LapNumber
  - Stint
  - Year
  - Round
  - TireAge
  - raceId
  - year
  - round
  - circuitId
  - alt
  - driverId_x
  - constructorId
  - grid
  - driverId_y
  - lap
  - milliseconds
  - RaceProgress
  - LapTimeSeconds

categorical_columns:
  - Driver
  - LapTime
  - PitInTime
  - PitOutTime
  - name_x
  - name_y
  - location
  - country
  - TrackName

binary_columns:
  - Compound_HARD
  - Compound_INTERMEDIATE
  - Compound_MEDIUM
  - Compound_SOFT
  - Compound_UNKNOWN
  - Compound_WET

metadata:
  problem_type: regression
  description: >
    Formula 1 tire strategy dataset used to predict lap time based on
    tire age, compound, race progress, track characteristics, and team performance.
  total_features: 32
  target: LapTimeSeconds